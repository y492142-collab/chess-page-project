<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess club - login</title>
<link rel="stylesheet"
href="style.css">
</head>
<body class="login-page">
 <div class="background"></div>   
 <div class="login-container">
    <form action="page2.html">
        <h2>Welcome grandmaster!</h2>
        <p>Enter your details to join us</p>
        <input type="text"
        placeholder="Username ">
        <input type="email"
        placeholder="Email"> 
          <input type="password"
        placeholder="Password">
                    <div
        class="radio-group">
                    <label>Gender:</label>
                    <input type="radio"
        name="gender" id="male" value="male">
                    <label for="male">Male</label>
                    <input type="radio"
        name="gender" id="female" value="female">
                    <label for="female">Female</label>
                    </div>

                    <div class="button-group">
                                     <button 
                        type="submit"
                        class="login-btn">Login</button>
                                    <button
                        type="reset"
                        class="reset-btn">Clear All</button>            
                    </div>
        
    </form>
 </div>

</body>
</html>
